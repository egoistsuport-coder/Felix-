<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Felix Bot v5.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ffd700;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
            --dark: #1a1a2e;
            --light: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: backgroundMove 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes backgroundMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px var(--shadow);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header-icon {
            font-size: 32px;
            animation: float 3s ease-in-out infinite;
        }

        .header-text h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 12px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            color: var(--dark);
            margin-left: 8px;
            animation: pulse 2s infinite;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px;
            gap: 6px;
            overflow-x: auto;
            position: sticky;
            top: 76px;
            z-index: 99;
            border-bottom: 1px solid var(--glass-border);
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            flex: 1;
            min-width: 90px;
            padding: 12px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--light);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .nav-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-tab:hover::before {
            left: 100%;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            color: var(--dark);
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            border-color: var(--accent);
        }

        .nav-tab-icon {
            font-size: 18px;
            display: block;
            margin-bottom: 4px;
        }

        .nav-tab-label {
            font-size: 11px;
        }

        /* Content */
        .content {
            padding: 16px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px var(--shadow);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-icon {
            font-size: 32px;
            animation: rotate 3s ease-in-out infinite;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            flex: 1;
        }

        .card-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-new {
            background: linear-gradient(135deg, var(--success), #66bb6a);
            color: white;
            animation: pulse 2s infinite;
        }

        .badge-hot {
            background: linear-gradient(135deg, var(--danger), #ff5252);
            color: white;
            animation: pulse 2s infinite;
        }

        .badge-pro {
            background: linear-gradient(135deg, var(--accent), #ffd54f);
            color: var(--dark);
            animation: pulse 2s infinite;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            padding: 20px 0;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 16px;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), float 3s ease-in-out infinite 0.6s;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.4);
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .profile-avatar::after {
            content: '';
            position: absolute;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease-out;
        }

        .profile-id {
            font-size: 13px;
            opacity: 0.7;
            animation: fadeIn 1s ease-out;
        }

        .profile-level {
            display: inline-block;
            background: linear-gradient(135deg, var(--info), #42a5f5);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        /* Progress */
        .progress-section {
            margin: 24px 0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .progress-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff6b6b);
            border-radius: 20px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* List Items */
        .list-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .list-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent), #ff6b6b);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .list-item:hover {
            transform: translateX(8px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px var(--shadow);
        }

        .list-item:hover::before {
            transform: scaleY(1);
        }

        .list-item-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .list-item-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .list-item-content {
            flex: 1;
        }

        .list-item-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .list-item-desc {
            font-size: 13px;
            opacity: 0.9;
            line-height: 1.4;
        }

        .list-item-meta {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 8px;
        }

        /* Buttons */
        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--light);
            padding: 14px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            border: none;
            color: var(--dark);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #66bb6a);
            border: none;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        @keyframes rotate {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-5deg);
            }
            75% {
                transform: rotate(5deg);
            }
        }

        @keyframes ping {
            75%, 100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.7;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-icon">🤖</div>
                <div class="header-text">
                    <h1>Felix Bot <span class="version-badge">v5.0</span></h1>
                    <div class="header-subtitle">AI-POWERED ASSISTANT</div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('profile')">
                <div class="nav-tab-icon">👤</div>
                <div class="nav-tab-label">Профиль</div>
            </div>
            <div class="nav-tab" onclick="switchTab('commands')">
                <div class="nav-tab-icon">⚡</div>
                <div class="nav-tab-label">Команды</div>
            </div>
            <div class="nav-tab" onclick="switchTab('academy')">
                <div class="nav-tab-icon">🎓</div>
                <div class="nav-tab-label">Академия</div>
            </div>
            <div class="nav-tab" onclick="switchTab('partners')">
                <div class="nav-tab-icon">🤝</div>
                <div class="nav-tab-label">Партнеры</div>
            </div>
            <div class="nav-tab" onclick="switchTab('settings')">
                <div class="nav-tab-icon">⚙️</div>
                <div class="nav-tab-label">Настройки</div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Profile Tab -->
            <div id="profile" class="tab-content active">
                <div class="card">
                    <div class="profile-section">
                        <div class="profile-avatar">🧠</div>
                        <div class="profile-name" id="userName">Загрузка...</div>
                        <div class="profile-id" id="userId">ID: ...</div>
                        <div class="profile-level">🏆 Уровень: Новичок</div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-label">
                            <span>Прогресс обучения</span>
                            <span class="progress-value" id="learningScore">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-icon">💬</span>
                            <div class="stat-value" id="totalMessages">0</div>
                            <div class="stat-label">Сообщений</div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-icon">⚡</span>
                            <div class="stat-value" id="commandsUsed">0</div>
                            <div class="stat-label">Команд</div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-icon" id="styleIcon">😎</span>
                            <div class="stat-value" id="styleType">Casual</div>
                            <div class="stat-label">Стиль</div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-icon">😊</span>
                            <div class="stat-value" id="emojiUsage">0</div>
                            <div class="stat-label">Эмодзи</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="card-icon">🎯</span>
                        <h2 class="card-title">Ваши интересы</h2>
                    </div>
                    <div id="interests">
                        <div class="empty-state">
                            <div class="empty-icon">🎯</div>
                            <p>Начните общаться с ботом,<br>и он определит ваши интересы</p>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="sendCommand('/profile')">
                    <span class="btn-icon">📊 Обновить профиль</span>
                </button>
            </div>
