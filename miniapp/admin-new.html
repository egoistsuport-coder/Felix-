<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Felix Admin Panel v5.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 0;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 87, 34, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #ff5722;
            margin-left: 8px;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            gap: 5px;
            overflow-x: auto;
            position: sticky;
            top: 70px;
            z-index: 99;
        }

        .tab {
            flex: 1;
            min-width: 100px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .content {
            padding: 15px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4caf50, #45a049);
            border: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            border: none;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            border: none;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
            margin: 0;
        }

        .request-item, .course-item, .partner-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .item-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .item-meta {
            font-size: 11px;
            opacity: 0.7;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .status-approved {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .status-rejected {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(30, 60, 114, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #4caf50;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-select option {
            background: #1e3c72;
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Admin Panel <span class="badge">v5.0</span></h1>
            <p style="font-size: 13px; opacity: 0.9; margin-top: 5px;">Управление Felix Bot</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab" onclick="switchTab('requests')">📝 Заявки</button>
            <button class="tab" onclick="switchTab('courses')">🎓 Курсы</button>
            <button class="tab" onclick="switchTab('partners')">🤝 Партнеры</button>
        </div>

        <div class="content">
            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content active">
                <div class="card">
                    <h2>📊 Статистика</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value" id="totalRequests">0</div>
                            <div class="stat-label">Заявок</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="pendingRequests">0</div>
                            <div class="stat-label">Ожидают</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalCourses">0</div>
                            <div class="stat-label">Курсов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="totalPartners">0</div>
                            <div class="stat-label">Партнеров</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>⚡ Быстрые действия</h2>
                    <button class="btn btn-primary" onclick="openAddCourseModal()">➕ Добавить курс</button>
                    <button class="btn btn-primary" onclick="openAddPartnerModal()">➕ Добавить партнера</button>
                    <button class="btn btn-warning" onclick="switchTab('requests')">📝 Проверить заявки</button>
                </div>
            </div>

            <!-- Requests Tab -->
            <div id="requests" class="tab-content">
                <div class="card">
                    <h2>📝 Заявки на партнерство</h2>
                    <div id="requestsList"></div>
                </div>
            </div>

            <!-- Courses Tab -->
            <div id="courses" class="tab-content">
                <div class="card">
                    <h2>🎓 Управление курсами</h2>
                    <button class="btn btn-primary" onclick="openAddCourseModal()">➕ Добавить курс</button>
                    <div id="coursesList" style="margin-top: 15px;"></div>
                </div>
            </div>

            <!-- Partners Tab -->
            <div id="partners" class="tab-content">
                <div class="card">
                    <h2>🤝 Управление партнерами</h2>
                    <button class="btn btn-primary" onclick="openAddPartnerModal()">➕ Добавить партнера</button>
                    <div id="partnersList" style="margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Course Modal -->
    <div id="courseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="courseModalTitle">➕ Добавить курс</div>
                <button class="modal-close" onclick="closeCourseModal()">×</button>
            </div>
            <form id="courseForm" onsubmit="saveCourse(event)">
                <input type="hidden" id="courseId">
                <div class="form-group">
                    <label class="form-label">Название курса *</label>
                    <input type="text" class="form-input" id="courseTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Описание *</label>
                    <textarea class="form-textarea" id="courseDesc" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Иконка (эмодзи)</label>
                    <input type="text" class="form-input" id="courseIcon" placeholder="📚" maxlength="2">
                </div>
                <div class="form-group">
                    <label class="form-label">Длительность</label>
                    <input type="text" class="form-input" id="courseDuration" placeholder="30 мин">
                </div>
                <div class="form-group">
                    <label class="form-label">Уровень *</label>
                    <select class="form-select" id="courseLevel" required>
                        <option value="beginner">Начальный</option>
                        <option value="intermediate">Средний</option>
                        <option value="advanced">Продвинутый</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Уроки (JSON массив) *</label>
                    <textarea class="form-textarea" id="courseLessons" placeholder='[{"title":"Урок 1","content":"Содержание","duration":"10 мин"}]' style="min-height: 120px;" required></textarea>
                    <div style="font-size: 11px; opacity: 0.7; margin-top: 4px;">
                        Формат: массив объектов с полями title, content, duration
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Add/Edit Partner Modal -->
    <div id="partnerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="partnerModalTitle">➕ Добавить партнера</div>
                <button class="modal-close" onclick="closePartnerModal()">×</button>
            </div>
            <form id="partnerForm" onsubmit="savePartner(event)">
                <input type="hidden" id="partnerId">
                <div class="form-group">
                    <label class="form-label">Название *</label>
                    <input type="text" class="form-input" id="partnerName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Описание *</label>
                    <textarea class="form-textarea" id="partnerDesc" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Логотип (эмодзи)</label>
                    <input type="text" class="form-input" id="partnerLogo" placeholder="🤝" maxlength="2">
                </div>
                <div class="form-group">
                    <label class="form-label">URL *</label>
                    <input type="url" class="form-input" id="partnerUrl" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Категория *</label>
                    <select class="form-select" id="partnerCategory" required>
                        <option value="education">Образование</option>
                        <option value="support">Поддержка</option>
                        <option value="services">Сервисы</option>
                        <option value="tools">Инструменты</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="partnerFeatured" style="width: auto; margin-right: 8px;">
                        Избранный партнер (TOP)
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">💾 Сохранить</button>
            </form>
        </div>
    </div>

    <script>
