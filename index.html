<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Felix Bot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { font-size: 48px; margin: 0 0 20px 0; }
        .status { color: #10b981; font-size: 20px; margin: 20px 0; }
        a {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Felix Bot</h1>
        <div class="status">✅ Онлайн</div>
        <p>Telegram Smart Assistant</p>
        <a href="https://t.me/fel12x_bot">Открыть в Telegram</a>
    </div>
</body>
</html>
